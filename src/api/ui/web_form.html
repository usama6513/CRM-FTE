<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Success FTE - Web Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #0f172a;
            --gray: #e2e8f0;
            --whatsapp-green: #10b981;
            --whatsapp-dark: #059669;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }

        .main-content {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid var(--gray);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray);
            margin-bottom: 1rem;
        }

        .sidebar h3 {
            color: var(--dark);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .support-option {
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .support-option:hover {
            background: #f1f5f9;
        }

        .support-option.active {
            background: #dbeafe;
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        .support-option i {
            width: 20px;
            text-align: center;
        }

        .main-form {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--secondary);
            font-size: 1.1rem;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .btn:active {
            transform: translateY(0);
        }

        .status {
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            display: none;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--gray);
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Support Channels</h3>
            </div>

            <div class="support-option active">
                <i class="fas fa-envelope"></i>
                <span>Email</span>
            </div>
            <div class="support-option">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </div>
            <div class="support-option">
                <i class="fas fa-globe"></i>
                <span>Web Form</span>
            </div>
            <div class="support-option">
                <i class="fas fa-phone"></i>
                <span>Phone</span>
            </div>
        </div>

        <div class="main-form">
            <div class="form-header">
                <h1><i class="fas fa-headset"></i> Web Support Form</h1>
                <p>Fill out the form below to submit your support request</p>
            </div>

            <div class="form-container">
                <form id="supportForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" name="name" required placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="subject">Subject *</label>
                            <input type="text" id="subject" name="subject" required placeholder="Brief description">
                        </div>
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" name="category" required>
                                <option value="">Select a category</option>
                                <option value="general">General Question</option>
                                <option value="technical">Technical Support</option>
                                <option value="billing">Billing Inquiry</option>
                                <option value="bug_report">Bug Report</option>
                                <option value="feature_request">Feature Request</option>
                                <option value="feedback">Feedback</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority" name="priority">
                                <option value="low">Low - Not urgent</option>
                                <option value="medium" selected>Medium - Need help soon</option>
                                <option value="high">High - Urgent issue</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="contact_method">Preferred Contact Method</label>
                            <select id="contact_method" name="contact_method">
                                <option value="email">Email</option>
                                <option value="phone">Phone</option>
                                <option value="any">Any</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">How can we help you? *</label>
                        <textarea id="message" name="message" required placeholder="Please describe your issue or question in detail..."></textarea>
                    </div>

                    <div id="result" class="status"></div>

                    <div style="text-align: center;">
                        <button type="submit" class="btn">
                            <i class="fas fa-paper-plane"></i>
                            Submit Support Request
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('supportForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                category: document.getElementById('category').value,
                priority: document.getElementById('priority').value,
                message: document.getElementById('message').value,
                contact_method: document.getElementById('contact_method').value,
                channel: 'web_form'
            };

            const result = document.getElementById('result');
            const submitBtn = document.querySelector('.btn');

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const response = await fetch('/api/web-form/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    const data = await response.json();
                    result.className = 'status success';
                    result.innerHTML = `
                        <i class="fas fa-check-circle"></i>
                        <strong>Success!</strong> Your ticket has been created successfully.
                        <br>Ticket ID: ${data.ticket_id}
                        <br>Our support team will respond within 2-4 hours.
                    `;
                    result.style.display = 'block';
                    document.getElementById('supportForm').reset();

                    // Redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    const error = await response.json();
                    result.className = 'status error';
                    result.innerHTML = `
                        <i class="fas fa-exclamation-circle"></i>
                        <strong>Error:</strong> ${error.detail || 'Failed to submit form'}
                    `;
                    result.style.display = 'block';
                }
            } catch (error) {
                result.className = 'status error';
                result.innerHTML = `
                    <i class="fas fa-exclamation-circle"></i>
                    <strong>Error:</strong> Could not submit form. Please try again.
                `;
                result.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Support Request';
            }
        });

        // Support option selection
        document.querySelectorAll('.support-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.support-option').forEach(opt => {
                    opt.classList.remove('active');
                });
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
